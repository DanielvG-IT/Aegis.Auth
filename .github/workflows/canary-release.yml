# ════════════════════════════════════════════════════════════════════════════════
# Canary Release — Manual GitHub Pre-release
# Triggered manually to cut an official canary release.
# Generates release notes in the style of better-auth: Features / Bug Fixes /
# Breaking Changes sections, a Contributors list, and a Full changelog link.
# ════════════════════════════════════════════════════════════════════════════════
name: Canary Release

on:
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  CONFIGURATION: Release
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  release:
    name: Cut Canary Release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Calculate canary version
        id: version
        run: |
          TAG=$(git describe --tags --abbrev=0 2>/dev/null) || TAG="v0.1.0"
          BASE_VERSION=$(echo "$TAG" | sed 's/^v//' | sed 's/-.*$//')
          CANARY_VERSION="${BASE_VERSION}-canary.${GITHUB_RUN_NUMBER}"
          echo "version=${CANARY_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        id: notes
        env:
          NEW_VERSION: ${{ steps.version.outputs.version }}
        run: |
          python3 << 'PYTHON'
          import subprocess, json, re, os

          new_version = os.environ["NEW_VERSION"]
          repo = os.environ["GITHUB_REPOSITORY"]

          # Find the last canary release to use as the comparison base
          result = subprocess.run(
              ["gh", "release", "list", "--limit", "10", "--json", "tagName,publishedAt"],
              capture_output=True, text=True
          )
          releases = json.loads(result.stdout.strip() or "[]")
          last_tag, last_date = "", "2020-01-01T00:00:00Z"
          for r in releases:
              if "canary" in r["tagName"]:
                  last_tag = r["tagName"]
                  last_date = r["publishedAt"]
                  break

          # Fetch merged PRs to canary since the last release
          result = subprocess.run(
              ["gh", "pr", "list",
               "--state", "merged",
               "--base", "canary",
               "--json", "title,number,author,labels",
               "--search", f"merged:>={last_date}",
               "--limit", "200"],
              capture_output=True, text=True
          )
          prs = json.loads(result.stdout.strip() or "[]")

          TYPE_RE = re.compile(
              r"^(feat|fix|chore|docs|refactor|test|ci|perf|build|breaking)(\([^)]*\))?[!]?[: ]+",
              re.IGNORECASE
          )
          BREAKING_RE = re.compile(r"^breaking|BREAKING CHANGE", re.IGNORECASE)
          FEAT_RE = re.compile(r"^feat(ure)?[!:(]|^feat\b", re.IGNORECASE)
          FIX_RE = re.compile(r"^fix[!:(]|^fix\b", re.IGNORECASE)

          def clean(title):
              t = TYPE_RE.sub("", title).strip()
              return t[0].upper() + t[1:] if t else title

          features, fixes, breaking, misc = [], [], [], []
          contributors = set()

          for pr in prs:
              title = pr["title"]
              contributors.add(pr["author"]["login"])
              entry = f"- {clean(title)} (#{pr['number']})"
              has_breaking = any(l["name"] == "breaking-change" for l in pr.get("labels", []))

              if BREAKING_RE.match(title) or has_breaking:
                  breaking.append(entry)
              elif FEAT_RE.match(title):
                  features.append(entry)
              elif FIX_RE.match(title):
                  fixes.append(entry)
              else:
                  misc.append(entry)

          sections = ["**Aegis.Auth**\n"]
          if breaking:
              sections.append("**Breaking Changes**\n" + "\n".join(breaking))
          if features:
              sections.append("**Features**\n" + "\n".join(features))
          if fixes:
              sections.append("**Bug Fixes**\n" + "\n".join(fixes))
          if misc:
              sections.append("**Misc Changes**\n" + "\n".join(misc))
          if contributors:
              contrib = ", ".join(f"@{c}" for c in sorted(contributors))
              sections.append(
                  f"**Contributors**\nThanks to everyone who contributed to this release:\n\n{contrib}"
              )
          range_str = f"{last_tag}...v{new_version}" if last_tag else f"v{new_version}"
          sections.append(f"Full changelog: {range_str}")

          body = "\n\n".join(sections)

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write("body<<RELEASE_EOF\n")
              f.write(body + "\n")
              f.write("RELEASE_EOF\n")
          PYTHON

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c ${{ env.CONFIGURATION }}

      - name: Test
        run: >
          dotnet test --no-build -c ${{ env.CONFIGURATION }}
          --logger "trx;LogFileName=results.trx"
          --results-directory ./TestResults

      - name: Pack
        run: >
          dotnet pack src/Aegis.Auth/Aegis.Auth.csproj
          --no-build -c ${{ env.CONFIGURATION }}
          -o ./artifacts
          /p:PackageVersion=${{ steps.version.outputs.version }}

      - name: Publish to GitHub Packages
        run: >
          dotnet nuget push ./artifacts/*.nupkg
          --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json"
          --api-key ${{ secrets.GITHUB_TOKEN }}
          --skip-duplicate

      - name: Create GitHub pre-release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: "v${{ steps.version.outputs.version }}"
          prerelease: true
          files: ./artifacts/*.nupkg
          body: ${{ steps.notes.outputs.body }}
