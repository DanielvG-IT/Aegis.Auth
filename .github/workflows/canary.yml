# ════════════════════════════════════════════════════════════════════════════════
# Canary — Continuous Build & Publish
# Triggers on every push to canary (i.e., merged PRs).
# Builds, tests, and publishes a pre-release NuGet package.
# GitHub Releases are cut separately via canary-release.yml.
# ════════════════════════════════════════════════════════════════════════════════
name: Canary

on:
  push:
    branches: [canary]

permissions:
  contents: read
  packages: write

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  CONFIGURATION: Release

jobs:
  canary:
    name: Canary Build & Publish
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Calculate pre-release version
        id: version
        run: |
          TAG=$(git describe --tags --abbrev=0 2>/dev/null) || TAG="v0.1.0"
          BASE_VERSION=$(echo "$TAG" | sed 's/^v//' | sed 's/-.*$//')
          SHORT_SHA=$(git rev-parse --short HEAD)
          PRERELEASE_VERSION="${BASE_VERSION}-canary.${GITHUB_RUN_NUMBER}.${SHORT_SHA}"
          echo "version=${PRERELEASE_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c ${{ env.CONFIGURATION }}

      - name: Test
        run: >
          dotnet test --no-build -c ${{ env.CONFIGURATION }}
          --logger "trx;LogFileName=results.trx"
          --collect:"XPlat Code Coverage"
          --results-directory ./TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: canary-test-results
          path: ./TestResults
          retention-days: 30

      - name: Pack pre-release
        run: >
          dotnet pack src/Aegis.Auth/Aegis.Auth.csproj
          --no-build -c ${{ env.CONFIGURATION }}
          -o ./artifacts
          /p:PackageVersion=${{ steps.version.outputs.version }}

      - name: Upload NuGet artifact
        uses: actions/upload-artifact@v7
        with:
          name: canary-nupkg
          path: ./artifacts/*.nupkg
          retention-days: 90

      - name: Publish to GitHub Packages
        run: >
          dotnet nuget push ./artifacts/*.nupkg
          --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json"
          --api-key ${{ secrets.GITHUB_TOKEN }}
          --skip-duplicate
